# Builds each PR and deploys it to pr-preview/pr-<number>/ on the
# gh-pages branch, posting the preview URL as a sticky PR comment.
# The preview is removed automatically when the PR is closed.
#
# Note: PRs from forks get no preview (their token can't push to
# gh-pages), but this also acts as the build check for same-repo PRs.
name: PR preview

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency: preview-${{ github.ref }}

jobs:
  preview:
    name: Build and deploy preview
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        if: github.event.action != 'closed'
        with:
          node-version: 20
          cache: npm
      - run: npm ci
        if: github.event.action != 'closed'
      - run: npm run build
        if: github.event.action != 'closed'
        env:
          BASE_URL: /ergogen-docs/pr-preview/pr-${{ github.event.number }}/
      - uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: build
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: auto
