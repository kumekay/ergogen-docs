name: Test deployment

on:
  pull_request:
    branches: [main]

jobs:
  test-deploy:
    name: Test build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Build with a root base URL so the preview artifact can be served
      # locally as-is (e.g. `npx serve`), unlike the GitHub Pages build.
      - run: npm run build
        env:
          BASE_URL: /
      - name: Upload docs preview
        uses: actions/upload-artifact@v4
        with:
          name: docs-preview-pr${{ github.event.pull_request.number }}
          path: build
          retention-days: 14
